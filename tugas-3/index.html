<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Formulir</title>
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <header>
      <h1>Selamat datang di Website Sederhana</h1>
    </header>

    <nav>
      <a href="#">Beranda</a>
      <a href="#">Tentang</a>
      <a href="#">Layanan</a>
      <a href="#">Kontak</a>
    </nav>

    <div class="main-container">
      <!-- Form -->
      <div class="form-container">
        <h2>Formulir Pendaftaran</h2>
        <p class="subtitle">
          Silakan isi formulir di bawah ini untuk mendaftar.
        </p>

        <form action="" method="post">
          <!-- Nama Lengkap -->
          <label class="field-label" for="name">Nama Lengkap:</label>
          <input type="text" id="name" name="name" />

          <!-- Email -->
          <label class="field-label" for="email">Email:</label>
          <input type="email" id="email" name="email" />

          <!-- Password -->
          <label class="field-label" for="password">Password:</label>
          <input type="password" id="password" name="password" />

          <!-- Jenis Kelamin -->
          <label class="field-label">Jenis Kelamin:</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="gender" value="Laki-laki" />
              Laki-laki
            </label>
            <label>
              <input type="radio" name="gender" value="Perempuan" />
              Perempuan
            </label>
          </div>

          <!-- Hobi -->
          <label class="field-label">Hobi:</label>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" name="hobi" value="Musik" />
              Musik
            </label>
            <label>
              <input type="checkbox" name="hobi" value="Olahraga" />
              Olahraga
            </label>
            <label>
              <input type="checkbox" name="hobi" value="Membaca" />
              Membaca
            </label>
          </div>

          <!-- Pilih Kota -->
          <label class="field-label" for="city">Pilih Kota:</label>
          <select id="city">
            <option value="">Loading...</option>
          </select>

          <!-- Pesan Tambahan -->
          <label class="field-label" for="message">Pesan Tambahan:</label>
          <textarea
            id="message"
            name="message"
            placeholder="Tulis pesan di sini..."
          ></textarea>

          <!-- Submit -->
          <button type="submit" class="btn-submit">Kirim</button>
        </form>
      </div>

      <!-- Sidebar -->
      <div class="sidebar-container">
        <h2>Sidebar</h2>
        <p>
          Bagian sidebar dapat berisi konten/tombol, iklan, atau informasi
          tambahan.
        </p>
      </div>
    </div>
  </body>
  <script>
    fetch("https://alamat.thecloudalert.com/api/kabkota/get/")
      .then((res) => res.json())
      .then((data) => {
        const select = document.getElementById("city");
        select.innerHTML = '<option value="">Pilih Kota</option>';

        data.result
          .filter((item) => item.text.startsWith("Kota"))
          .forEach((kota) => {
            const option = document.createElement("option");
            option.value = kota.text;
            option.textContent = kota.text.replace("Kota ", "");
            select.appendChild(option);
          });
      })
      .catch(() => {
        document.getElementById("city").innerHTML =
          '<option value="">Gagal memuat data</option>';
      });
  </script>
</html>
