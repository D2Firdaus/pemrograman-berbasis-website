<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praktikum 2</title>
    <link rel="stylesheet" href="./style/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1 class="kelasbanget">Formulir Pendaftaran</h1>
    <div class="form-container">
      <form action="" method="" class="form">
        <label for="username">Username:</label>
        <input
          type="text"
          name="username"
          id="username"
          placeholder="Username"
        />
        <br />
        <label for="gender">Jenis Kelamin:</label>
        <input type="radio" name="gender" value="Laki-laki" />
        <label for="male">Laki-laki</label>
        <input type="radio" name="gender" value="Perempuan" />
        <label for="female">Perempuan</label>
        <br />
        <label for="hobi">Hobi:</label>
        <input type="checkbox" name="hobi" value="Membaca" />
        <label for="reading">Membaca</label>
        <input type="checkbox" name="hobi" value="Menulis" />
        <label for="writing">Menulis</label>
        <input type="checkbox" name="hobi" value="Olahraga" />
        <label for="sports">Olahraga</label>
        <br />
        <label for="file">Upload File</label>
        <input type="file" name="file" accept=".pdf" />
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
